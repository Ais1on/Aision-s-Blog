[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
