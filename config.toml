baseURL = "https://ais1on.github.io/Aision-s-Blog/"
languageCode = "zh-cn"
title = "Aision'Blog"
theme = "apple-minimal"

[params]
  description = "记录写作、项目与技术笔记。"
  author = "Aision"
  tagline = "Tring to be better."
  github = "https://github.com/ais1on"
  email = "leexpeng@foxmail.com"
  twitter = "https://twitter.com/"
  about_avatar_image = "images/about.jpg"
  avatar_image = "images/avatar.jpg"
  avatar_label = "A"

[menu]
  [[menu.main]]
    name = "博客"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "项目"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 30
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/ais1on"
