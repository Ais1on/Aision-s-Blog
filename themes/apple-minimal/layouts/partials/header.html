<header class="site-header">
  <a class="site-title" href="{{ .Site.Home.RelPermalink }}">{{ .Site.Title }}</a>
  <nav class="site-nav" aria-label="Primary navigation">
    {{ range .Site.Menus.main }}
      {{ if hasPrefix .URL "http" }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ else }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    {{ end }}
  </nav>
</header>
